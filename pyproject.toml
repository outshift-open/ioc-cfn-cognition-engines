[tool.poetry]
name = "ci-kxp-adapter-base-lib"
version = "0.1.0"
description = "KXP Adapter Base Library for entity and relation extraction from telemetry data"
authors = ["Your Team <team@example.com>"]
readme = "README.md"
packages = [{include = "app"}]

[tool.poetry.dependencies]
python = "^3.11"
requests = "^2.32.5"
werkzeug = ">=2.2.2"
fastapi = ">=0.104.0"
uvicorn = ">=0.24.0"
openai = ">=1.0.0"
pandas = "^2.0.0"
python-dotenv = "^1.0.0"
pydantic = "^2.12.5"
ci-tkf-csp-data-model-lib = {git = "https://github.com/cisco-eti/ci-tkf-csp-data-model-lib.git"}
langchain-openai = "^1.1.7"
sentence-transformers = ">=2.2.0"
numpy = ">=1.24.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
pytest-cov = "^4.1.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["app/tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v -s --tb=short"
