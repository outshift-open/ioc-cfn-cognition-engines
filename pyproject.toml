[tool.poetry]
name = "ioc-cfn-cognitive-agents"
version = "0.1.0"
description = "IOC CFN Cognitive Agents – monorepo (gateway + ingestion + evidence + caching)"
authors = ["Your Team <team@example.com>"]
readme = "README.md"
# No installable packages – this pyproject.toml is used purely for
# centralised dependency management across all four services.
packages = []

# ── PyTorch CPU-only index ────────────────────────────────────────────────────
# Pinning torch to the CPU wheel keeps the Docker image ~6 GB smaller than
# the default CUDA build resolved from PyPI.
[[tool.poetry.source]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
priority = "supplemental"

# ── Shared runtime dependencies (union of all four services) ─────────────────
[tool.poetry.dependencies]
python = "^3.11"

# Web framework & ASGI server
fastapi = ">=0.110"
uvicorn = {version = ">=0.27", extras = ["standard"]}
httpx = ">=0.27"

# Data validation / settings
pydantic = ">=2.12.5"
pydantic-settings = ">=2.0.0"
python-dotenv = ">=1.0.1"

# AI / ML – torch MUST come from the pytorch-cpu source (see [[tool.poetry.source]] above)
torch = {version = ">=2.1.0", source = "pytorch-cpu"}
sentence-transformers = ">=5.2.2"
openai = ">=2.17.0"
numpy = ">=1.26,<3"

# Vector store
faiss-cpu = ">=1.7.4"

# Process supervisor (runs all services inside one container)
supervisor = ">=4.2.0"

# ── Service-specific extras kept at top level ─────────────────────────────────
requests = ">=2.32.5"
werkzeug = ">=2.2.2"
pandas = ">=2.0.0"
langchain-openai = ">=1.1.7"

# ── Dev / test dependencies ───────────────────────────────────────────────────
[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
pytest-cov = ">=4.1.0"
pytest-asyncio = ">=0.23.0"
httpx = ">=0.27"          # also needed at runtime but explicit here for tests
ruff = ">=0.1.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = [
    "gateway/tests",
    "ingestion-cognitive-agent/tests",
    "evidence-gathering-agent/tests",
    "caching-layer/tests",
    "tests",
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v -s --tb=short"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]
