# Single process: unified app (gateway) mounts ingestion and evidence; one uvicorn, one port (9004).
# Shared in-memory CachingLayer created at startup; no proxy, no separate cache server.
# Usage: docker compose up --build
# Then: http://localhost:9004/ingestion/..., http://localhost:9004/evidence/...

services:
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9004:9004"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
