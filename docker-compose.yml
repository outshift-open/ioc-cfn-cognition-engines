# All-in-one container: gateway + ingestion + evidence + caching run under supervisord.
# Only port 8000 (gateway) is exposed externally; all inter-service calls use localhost.
# Usage: docker compose up --build
# Then: http://localhost:8000/ingestion/..., http://localhost:8000/evidence/...

services:
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Gateway routes to localhost since all services share the same container
      - INGESTION_BASE_URL=http://localhost:8086
      - EVIDENCE_BASE_URL=http://localhost:8087
      - CACHE_BASE_URL=http://localhost:8091
      - CACHING_LAYER_BASE_URL=http://localhost:8091
      - TKF_DATA_LAYER_BASE_URL=${TKF_DATA_LAYER_BASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      # test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
