# https://taskfile.dev
version: '3'

vars:
  APP_NAME: caching-layer

tasks:
  install:
    desc: Install repository dependencies
    dir: ..
    cmds:
      - poetry install

  test:
    desc: Run unit tests
    cmds:
      - poetry run pytest tests -v

  lint:
    desc: Lint the caching layer code
    cmds:
      - poetry run ruff check app tests

  format:
    desc: Format caching layer code
    cmds:
      - poetry run ruff format app tests

  default:
    desc: Show available tasks
    cmds:
      - task --list
