name: Publish to Artifactory

on:
  push:
    branches:
      - clawbee
    paths:
      - 'ingestion/**'
      - 'evidence/**'
      - 'caching/**'
      - 'gateway/**'
      - 'semantic_negotiation/**'
      - 'pyproject.toml'
      - 'poetry.lock'
    # Folders explicitly excluded from triggering this workflow:
    #   test_callback_agents_go/  — Go test harness, not published
    #   sample_trace/             — local trace data, not published

jobs:
  publish:
    runs-on:
      group: ${{ vars.DEFAULT_ARC_RUNNERS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Poetry installation
        run: poetry --version

      - name: Import Vault Secrets
        uses: hashicorp/vault-action@d1720f055e0635fd932a1d2a48f87a666a57906c # v2.7.5
        with:
          url: ${{ vars.KEEPER_URL }}
          method: approle
          roleId: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
          secretId: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
          namespace: ${{ vars.VAULT_NAMESPACE }}
          secrets: |
            ${{ vars.VAULT_SECRET_PATH }}  ARTIFACTORY_BASE_URL | ARTIFACTORY_BASE_URL ;
            ${{ vars.VAULT_SECRET_PATH }}  ARTIFACTORY_DEVHUB_PYTHON_TOKEN | ARTIFACTORY_DEVHUB_PYTHON_TOKEN ;
            ${{ vars.VAULT_SECRET_PATH }}  ARTIFACTORY_USER | ARTIFACTORY_USER ;

      - name: Auto-version package
        run: |
          VERSION=$(poetry version -s)
          poetry version $VERSION
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      - name: Configure Artifactory repository
        run: |
          poetry config repositories.artifactory https://${{ env.ARTIFACTORY_BASE_URL }}/artifactory/api/pypi/outshift-pypi

      - name: Configure Artifactory credentials
        run: |
          poetry config http-basic.artifactory ${{ env.ARTIFACTORY_USER }} ${{ env.ARTIFACTORY_DEVHUB_PYTHON_TOKEN }}

      - name: Check if version already exists in Artifactory
        id: exists
        env:
          ART_USER: ${{ env.ARTIFACTORY_USER }}
          ART_TOKEN: ${{ env.ARTIFACTORY_DEVHUB_PYTHON_TOKEN }}
          ART_HOST: ${{ env.ARTIFACTORY_BASE_URL }}
          PKG: ${{ env.NAME }}
          VER: ${{ env.VERSION }}
        run: |
          set -euo pipefail

          # PEP 503 normalization: lowercase and replace runs of [-_.] with '-'
          NORM_PKG="$(echo "$PKG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[-_.]+/-/g')"
          SIMPLE_URL="https://${ART_HOST}/artifactory/api/pypi/outshift-pypi/simple/${NORM_PKG}/"

          echo "Checking: $SIMPLE_URL"

          # If package doesn't exist yet, Artifactory may return 404.
          HTTP_CODE=$(curl -sS -u "${ART_USER}:${ART_TOKEN}" -o /tmp/simple.html -w "%{http_code}" "$SIMPLE_URL" || true)

          if [ "$HTTP_CODE" = "404" ]; then
            echo "No simple index found (package likely not published yet)."
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Failed to query simple index (HTTP $HTTP_CODE)."
            cat /tmp/simple.html || true
            exit 1
          fi

          # Look for artifacts that contain "-<version>" in filename
          if grep -qiE "[-_]${VER}([-.+]|%2B)" /tmp/simple.html; then
            echo "Version ${VER} appears to already exist. Skipping publish."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VER} not found. Will publish."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.exists.outputs.exists != 'true'
        run: poetry install --no-interaction --no-root

      - name: Build package
        if: steps.exists.outputs.exists != 'true'
        run: poetry build

      - name: Publish to Artifactory
        if: steps.exists.outputs.exists != 'true'
        run: poetry publish -r artifactory

      - name: Output published version
        run: |
          if [ "${{ steps.exists.outputs.exists }}" = "true" ]; then
            echo "ℹ️ Skipped publishing ${{ env.NAME }} version ${{ env.VERSION }} (already exists)."
          else
            echo "✅ Successfully published ${{ env.NAME }} version ${{ env.VERSION }}"
          fi
