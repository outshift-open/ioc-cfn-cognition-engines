# https://taskfile.dev
version: '3'

vars:
  APP_NAME: otel-ingestion-agent
  DOCKER_IMAGE: '{{.APP_NAME}}:latest'
  PYTHON_VERSION: '3.11'

tasks:
  # ============== Setup ==============
  
  install:
    desc: Install dependencies with poetry
    cmds:
      - poetry install
  
  install:dev:
    desc: Install dependencies including dev packages
    cmds:
      - poetry install --with dev
  
  # ============== Development ==============
  
  run:
    desc: Run the FastAPI server locally
    cmds:
      - poetry run python -m app.main
  
  run:dev:
    desc: Run the FastAPI server with hot reload
    cmds:
      - poetry run uvicorn app.main:app --host 0.0.0.0 --port 8086 --reload
  
  # ============== Testing ==============
  
  test:
    desc: Run all tests
    cmds:
      - poetry run pytest tests/ -v
  
  test:unit:
    desc: Run unit tests only
    cmds:
      - poetry run pytest tests/unit/ -v
  
  test:integration:
    desc: Run integration tests only
    cmds:
      - poetry run pytest tests/integration/ -v
  
  test:cov:
    desc: Run tests with coverage report
    cmds:
      - poetry run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=html
  
  test:watch:
    desc: Run tests in watch mode (requires pytest-watch)
    cmds:
      - poetry run ptw tests/ -- -v
  
  # ============== Code Quality ==============
  
  lint:
    desc: Run linting with ruff
    cmds:
      - poetry run ruff check app/ tests/
  
  lint:fix:
    desc: Run linting and auto-fix issues
    cmds:
      - poetry run ruff check app/ tests/ --fix
  
  format:
    desc: Format code with ruff
    cmds:
      - poetry run ruff format app/ tests/
  
  format:check:
    desc: Check code formatting without changes
    cmds:
      - poetry run ruff format app/ tests/ --check
  
  typecheck:
    desc: Run type checking with mypy
    cmds:
      - poetry run mypy app/
  
  check:
    desc: Run all code quality checks
    cmds:
      - task: lint
      - task: format:check
      - task: test
  
  # ============== Docker ==============
  
  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.DOCKER_IMAGE}} .
    vars:
      GITHUB_TOKEN:
        sh: echo $GITHUB_TOKEN
  
  docker:build:no-cache:
    desc: Build Docker image without cache
    cmds:
      - docker build --no-cache -t {{.DOCKER_IMAGE}} .
  
  docker:run:
    desc: Run Docker container
    cmds:
      - docker run -p 8086:8086 --env-file .env {{.DOCKER_IMAGE}}
  
  docker:run:detached:
    desc: Run Docker container in detached mode
    cmds:
      - docker run -d -p 8086:8086 --env-file .env --name {{.APP_NAME}} {{.DOCKER_IMAGE}}
  
  docker:stop:
    desc: Stop running Docker container
    cmds:
      - docker stop {{.APP_NAME}} || true
      - docker rm {{.APP_NAME}} || true
  
  docker:logs:
    desc: View Docker container logs
    cmds:
      - docker logs -f {{.APP_NAME}}
  
  docker:shell:
    desc: Open shell in running container
    cmds:
      - docker exec -it {{.APP_NAME}} /bin/bash
  
  # ============== Cleanup ==============
  
  clean:
    desc: Clean up temporary files and caches
    cmds:
      - rm -rf __pycache__ .pytest_cache .mypy_cache .ruff_cache
      - rm -rf htmlcov .coverage coverage.xml
      - find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete 2>/dev/null || true
  
  clean:docker:
    desc: Remove Docker image
    cmds:
      - docker rmi {{.DOCKER_IMAGE}} || true
  
  clean:all:
    desc: Clean everything including Docker
    cmds:
      - task: clean
      - task: clean:docker
  
  # ============== Help ==============
  
  default:
    desc: Show available tasks
    cmds:
      - task --list

