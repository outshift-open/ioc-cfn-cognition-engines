# https://taskfile.dev
version: '3'

vars:
  APP_NAME: semantic-negotiation-agent

tasks:
  install:
    desc: Install repository dependencies
    dir: ..
    cmds:
      - poetry install

  run:
    desc: Start the Semantic Negotiation Agent API server
    cmds:
      - poetry run uvicorn app.main:app --host 0.0.0.0 --port 8089 --reload

  test:
    desc: Run unit tests
    cmds:
      - poetry run pytest tests -v

  lint:
    desc: Lint the semantic negotiation agent code
    cmds:
      - poetry run ruff check app tests

  format:
    desc: Format semantic negotiation agent code
    cmds:
      - poetry run ruff format app tests

  default:
    desc: Show available tasks
    cmds:
      - task --list
